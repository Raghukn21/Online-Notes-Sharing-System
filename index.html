<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Notes Sharing - Login</title>
    
    <!-- CSS Dependencies -->
    <style>
        /* CSS Variables and Global Styles */
        :root {
            /* Color Palette */
            --primary-color: #667eea;
            --primary-dark: #5a67d8;
            --primary-light: #7c3aed;
            --secondary-color: #48bb78;
            --accent-color: #ed8936;
            --danger-color: #f56565;
            --warning-color: #ecc94b;
            --info-color: #4299e1;
            
            /* Glassmorphism Colors */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --glass-backdrop: blur(4px);
            --glass-backdrop-strong: blur(16px);
            
            /* Text Colors */
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --text-light: #a0aec0;
            --text-white: #ffffff;
            
            /* Spacing */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
            --spacing-3xl: 4rem;
            
            /* Border Radius */
            --radius-sm: 0.25rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            
            /* Typography */
            --font-family-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.125rem;
            --font-size-xl: 1.25rem;
            --font-size-2xl: 1.5rem;
            --font-size-3xl: 1.875rem;
            --font-size-4xl: 2.25rem;
            
            /* Transitions */
            --transition-fast: 150ms ease-in-out;
            --transition-normal: 250ms ease-in-out;
            --transition-slow: 350ms ease-in-out;
        }

        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family-sans);
            line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Components */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop-strong);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--glass-shadow);
            padding: var(--spacing-xl);
            transition: all var(--transition-normal);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.45);
        }

        /* Header Glassmorphism */
        .glass-header {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop-strong);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-lg) var(--spacing-2xl);
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            font-size: var(--font-size-xl);
            font-weight: 600;
            color: var(--text-white);
        }

        .nav-brand i {
            font-size: var(--font-size-2xl);
            color: var(--accent-color);
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .nav-link {
            color: var(--text-white);
            text-decoration: none;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            font-weight: 500;
        }

        .nav-link:hover {
            background: var(--glass-bg);
            color: var(--text-white);
            text-decoration: none;
        }

        /* Forms */
        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 500;
            color: var(--text-white);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: var(--spacing-md);
            color: var(--text-light);
            z-index: 1;
        }

        .input-wrapper input,
        .input-wrapper textarea,
        .input-wrapper select {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            padding-left: 2.5rem;
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-md);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            color: var(--text-white);
            font-size: var(--font-size-base);
            transition: all var(--transition-normal);
        }

        .input-wrapper input:focus,
        .input-wrapper textarea:focus,
        .input-wrapper select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-sm) var(--spacing-lg);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-normal);
            text-decoration: none;
            min-height: 44px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: var(--text-white);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary-color), #38a169);
            color: var(--text-white);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Authentication Styles */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .auth-header h1 {
            color: var(--text-white);
            font-size: var(--font-size-3xl);
            margin-bottom: var(--spacing-md);
        }

        .auth-header p {
            color: var(--text-light);
            font-size: var(--font-size-lg);
        }

        .auth-tabs {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xl);
            background: var(--glass-bg);
            padding: var(--spacing-xs);
            border-radius: var(--radius-lg);
        }

        .tab-btn {
            flex: 1;
            padding: var(--spacing-md);
            border: none;
            background: transparent;
            color: var(--text-light);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            font-weight: 500;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: var(--text-white);
            box-shadow: var(--shadow-md);
        }

        .tab-btn:hover:not(.active) {
            background: var(--glass-border);
            color: var(--text-white);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        /* Camera Interface */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto var(--spacing-lg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-dark);
        }

        #face-camera {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 3px solid var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
                opacity: 0.8;
            }
        }

        .camera-controls {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
        }

        /* Fingerprint Scanner */
        .fingerprint-scanner {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .scanner-animation {
            position: relative;
            display: inline-block;
            margin-bottom: var(--spacing-md);
        }

        .scanner-animation i {
            font-size: 80px;
            color: var(--primary-color);
            position: relative;
            z-index: 2;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-color);
            animation: scan 2s linear infinite;
            z-index: 3;
        }

        @keyframes scan {
            0% { top: 0; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .scanner-text {
            color: var(--text-light);
            font-size: var(--font-size-sm);
            margin-top: var(--spacing-md);
        }

        .auth-footer {
            text-align: center;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--glass-border);
        }

        .auth-footer p {
            color: var(--text-light);
            font-size: var(--font-size-sm);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: var(--glass-backdrop);
            z-index: 1050;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop-strong);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            max-width: 500px;
            width: 90%;
            box-shadow: var(--glass-shadow);
            position: relative;
            text-align: center;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--spacing-md);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: var(--spacing-lg);
            right: var(--spacing-lg);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            z-index: 1080;
            max-width: 400px;
            animation: slideIn 0.3s ease-out;
        }

        .notification.success {
            background: linear-gradient(135deg, var(--secondary-color), #38a169);
            color: var(--text-white);
        }

        .notification.error {
            background: linear-gradient(135deg, var(--danger-color), #e53e3e);
            color: var(--text-white);
        }

        .notification.warning {
            background: linear-gradient(135deg, var(--warning-color), #d69e2e);
            color: var(--text-white);
        }

        .notification.info {
            background: linear-gradient(135deg, var(--info-color), #3182ce);
            color: var(--text-white);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .navbar {
                padding: var(--spacing-md);
                flex-wrap: wrap;
            }
            
            .nav-menu {
                flex-direction: column;
                width: 100%;
                gap: var(--spacing-sm);
                margin-top: var(--spacing-md);
            }
            
            .auth-card {
                margin: var(--spacing-md);
                padding: var(--spacing-lg);
            }
            
            .auth-tabs {
                flex-direction: column;
            }
            
            .tab-btn {
                padding: var(--spacing-lg);
            }
            
            .camera-container {
                max-width: 100%;
            }
            
            #face-camera {
                height: 250px;
            }
            
            .face-guide {
                width: 150px;
                height: 150px;
            }
        }
    </style>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Header -->

        <nav class="navbar">

    <!-- JavaScript -->
    <script>
        // Authentication Module - Handles login, signup, and biometric authentication
        class AuthManager {
            constructor() {
                this.currentTab = 'password';
                this.cameraStream = null;
                this.init();
            }

            init() {
                this.setupTabSwitching();
                this.setupPasswordForm();
                this.setupFaceLogin();
                this.setupFingerprintLogin();
                this.setupPasswordToggle();
            }

            setupTabSwitching() {
                const tabButtons = document.querySelectorAll('.tab-btn');
                const authForms = document.querySelectorAll('.auth-form');

                tabButtons.forEach(button => {
                    button.addEventListener('click', () => {
                        const tabName = button.dataset.tab;
                        this.switchTab(tabName);
                    });
                });
            }

            switchTab(tabName) {
                // Update tab buttons
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tabName);
                });

                // Update forms
                document.querySelectorAll('.auth-form').forEach(form => {
                    form.classList.toggle('active', form.id === `${tabName}-login`);
                });

                this.currentTab = tabName;

                // Stop camera if switching away from face login
                if (tabName !== 'face' && this.cameraStream) {
                    this.stopCamera();
                }
            }

            setupPasswordForm() {
                const form = document.getElementById('password-form');
                if (form) {
                    form.addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.handlePasswordLogin();
                    });
                }
            }

            async handlePasswordLogin() {
                const form = document.getElementById('password-form');
                const formData = new FormData(form);
                
                const loginData = {
                    username: formData.get('username'),
                    password: formData.get('password'),
                    method: 'password'
                };

                try {
                    this.showLoading();
                    
                    // Simulate API call
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    // For demo purposes, accept any login
                    this.showNotification('Login successful! Redirecting to dashboard...', 'success');
                    setTimeout(() => {
                        this.showNotification('Demo: This would redirect to dashboard', 'info');
                    }, 1000);
                    
                } catch (error) {
                    console.error('Login error:', error);
                    this.showNotification('An error occurred during login', 'error');
                } finally {
                    this.hideLoading();
                }
            }

            setupFaceLogin() {
                const startCameraBtn = document.getElementById('start-camera');
                const captureFaceBtn = document.getElementById('capture-face');

                if (startCameraBtn) {
                    startCameraBtn.addEventListener('click', () => this.startCamera());
                }

                if (captureFaceBtn) {
                    captureFaceBtn.addEventListener('click', () => this.captureFace());
                }
            }

            async startCamera() {
                try {
                    this.cameraStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            facingMode: 'user'
                        }
                    });

                    const video = document.getElementById('face-camera');
                    video.srcObject = this.cameraStream;

                    // Enable capture button
                    document.getElementById('capture-face').disabled = false;
                    document.getElementById('start-camera').disabled = true;

                    this.showNotification('Camera started successfully', 'success');
                } catch (error) {
                    console.error('Camera error:', error);
                    this.showNotification('Failed to access camera. Please check permissions.', 'error');
                }
            }

            stopCamera() {
                if (this.cameraStream) {
                    this.cameraStream.getTracks().forEach(track => track.stop());
                    this.cameraStream = null;

                    const video = document.getElementById('face-camera');
                    video.srcObject = null;

                    // Reset buttons
                    document.getElementById('capture-face').disabled = true;
                    document.getElementById('start-camera').disabled = false;
                }
            }

            async captureFace() {
                const video = document.getElementById('face-camera');
                const canvas = document.getElementById('face-canvas');
                const context = canvas.getContext('2d');

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0);

                const imageData = canvas.toDataURL('image/jpeg');
                const username = document.getElementById('face-username').value;

                if (!username) {
                    this.showNotification('Please enter your username', 'error');
                    return;
                }

                try {
                    this.showLoading();

                    // Simulate face recognition
                    await new Promise(resolve => setTimeout(resolve, 2000));

                    this.showNotification('Face recognition successful! Redirecting...', 'success');
                    setTimeout(() => {
                        this.showNotification('Demo: This would redirect to dashboard', 'info');
                    }, 1000);
                    
                } catch (error) {
                    console.error('Face login error:', error);
                    this.showNotification('An error occurred during face login', 'error');
                } finally {
                    this.hideLoading();
                }
            }

            setupFingerprintLogin() {
                const scanBtn = document.getElementById('scan-fingerprint');
                if (scanBtn) {
                    scanBtn.addEventListener('click', () => this.scanFingerprint());
                }
            }

            async scanFingerprint() {
                const username = document.getElementById('fingerprint-username').value;

                if (!username) {
                    this.showNotification('Please enter your username', 'error');
                    return;
                }

                try {
                    this.showLoading();

                    // Check if WebAuthn is supported
                    if (!navigator.credentials) {
                        throw new Error('Fingerprint authentication not supported on this device');
                    }

                    // Simulate fingerprint scan
                    await new Promise(resolve => setTimeout(resolve, 3000));

                    this.showNotification('Fingerprint authentication successful! Redirecting...', 'success');
                    setTimeout(() => {
                        this.showNotification('Demo: This would redirect to dashboard', 'info');
                    }, 1000);
                    
                } catch (error) {
                    console.error('Fingerprint login error:', error);
                    this.showNotification('Fingerprint authentication failed or not supported', 'error');
                } finally {
                    this.hideLoading();
                }
            }

            setupPasswordToggle() {
                const toggleButtons = document.querySelectorAll('.toggle-password');
                toggleButtons.forEach(button => {
                    button.addEventListener('click', () => {
                        const input = button.parentElement.querySelector('input');
                        const icon = button.querySelector('i');
                        
                        if (input.type === 'password') {
                            input.type = 'text';
                            icon.classList.remove('fa-eye');
                            icon.classList.add('fa-eye-slash');
                        } else {
                            input.type = 'password';
                            icon.classList.remove('fa-eye-slash');
                            icon.classList.add('fa-eye');
                        }
                    });
                });
            }

            showLoading() {
                const modal = document.getElementById('loading-modal');
                if (modal) {
                    modal.classList.add('active');
                }
            }

            hideLoading() {
                const modal = document.getElementById('loading-modal');
                if (modal) {
                    modal.classList.remove('active');
                }
            }

            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.remove();
                }, 5000);
            }
        }

        // Initialize authentication manager when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            if (document.querySelector('.auth-container')) {
                window.authManager = new AuthManager();
            }
        });
    </script>
</body>
</html>
