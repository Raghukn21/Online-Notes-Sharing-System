{% extends "base.html" %}

{% block title %}Upload Note - Online Notes Sharing{% endblock %}

{% block content %}
<div id="wrapper">
    <div id="page-wrapper">
        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-12">
                    <h1 class="page-header">UPLOAD NOTE</h1>
                    <form role="form" action="" method="POST" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="post_title">Note Title</label>
                            <input type="text" name="title" class="form-control" placeholder="Eg: Php Tutorial File"
                                required="">
                        </div>

                        <div class="form-group">
                            <label for="post_description">Short Note Description</label>
                            <input type="text" name="description" class="form-control"
                                placeholder="Eg: Php Tutorial File includes basic php programming ...." required="">
                        </div>

                        <div class="form-group">
                            <label for="post_image">Select File</label>
                            <font color="brown"> (allowed file type: 'pdf','doc','ppt','txt','zip' | allowed maximum
                                size: 30 mb ) </font>
                            <input type="file" name="file" required="">
                        </div>

                        <button type="submit" name="upload" class="btn btn-primary" value="Upload Note">Upload
                            Note</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
