{% extends "notes/base.html" %}
{% load static %}

{% block title %}Sign Up - Online Notes Sharing{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 0;
    }

    .auth-card {
        width: 100%;
        max-width: 500px;
        padding: 40px;
    }

    .auth-card h1 {
        font-weight: 800;
        margin-bottom: 10px;
        text-align: center;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        font-weight: 600;
        margin-bottom: 5px;
        font-size: 13px;
    }

    .form-control {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        color: white;
        height: 40px;
        border-radius: 8px;
    }

    .auth-footer {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
        opacity: 0.8;
    }

    .auth-footer a {
        color: var(--accent-color);
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card animate-3d">
        <h1>Join ONSS</h1>
        <p style="text-align: center; opacity: 0.7; margin-bottom: 30px;">Start sharing your knowledge today.</p>

        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="firstname" class="form-control" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="lastname" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" name="cpwd" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Role</label>
                        <select name="role" class="form-control" required>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Course</label>
                        <input type="text" name="course" class="form-control" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-modern w-100" style="margin-top: 20px; width: 100%;">Create
                Account</button>
        </form>

        <div class="auth-footer">
            Already registered? <a href="{% url 'login' %}">Login Here</a>
        </div>
    </div>
</div>
{% endblock %}
